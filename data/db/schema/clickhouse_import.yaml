variants: |
  INSERT INTO variants (name, source, source_url, chr, pos, rsid, ref, alt, qual, filter, variation_type, annotations, spdi, hgvs, vrs_digest, ca_id, organism, files_filesets, id)
  SELECT name, source, source_url, chr, pos, rsid, ref, alt, qual, filter, variation_type, annotations, spdi, hgvs, '' as vrs_digest, ca_id, organism, '' as files_filesets, _key as id
  FROM s3('s3://igvf-catalog-parsed-collections/variants/*spdi*.jsonl', 'JSONEachRow', '_key String, name String, chr String, pos Int64, rsid Array(String), ref String, alt String, qual String, filter Nullable(String), variation_type String, annotations JSON, ca_id String, format String, spdi String, hgvs String, organism String, source String, source_url String');
  INSERT INTO variants (name, source, source_url, chr, pos, rsid, ref, alt, qual, filter, variation_type, annotations, spdi, hgvs, vrs_digest, ca_id, organism, files_filesets, id)
  SELECT name, source, source_url, chr, pos, rsid, ref, alt, qual, filter, '' as variation_type, annotations, spdi, hgvs, '' as vrs_digest, ca_id, organism, '' as files_filesets, _key as id
  FROM s3('s3://igvf-catalog-parsed-collections/variants/variants_IGVFFI5890AHYL.jsonl', 'JSONEachRow', 'name String, chr String, pos String, rsid String, ref String, alt String, qual String, spdi String, hgvs String, ca_id String, filter String, source String, organism String, source_url String, annotations String, _key String, id String');
  INSERT INTO variants (name, source, source_url, chr, pos, rsid, ref, alt, qual, filter, variation_type, annotations, spdi, hgvs, vrs_digest, ca_id, organism, files_filesets, id)
  SELECT name, source, source_url, chr, pos, rsid, ref, alt, qual, filter, '' as variation_type, annotations, spdi, hgvs, '' as vrs_digest, ca_id, organism, '' as files_filesets, _key as id
  FROM s3('s3://igvf-catalog-parsed-collections/variants/bluestarr_IGVFFI1663LKVQ.jsonl', 'JSONEachRow', 'name String, chr String, pos String, rsid String, ref String, alt String, qual String, spdi String, hgvs String, ca_id String, filter String, source String, organism String, source_url String, annotations String, _key String, id String');

coding_variants: |
  INSERT INTO coding_variants (name, source, source_url, ref, alt, aapos, gene_name, protein_name, protein_id, hgvsp, hgvsc, refcodon, codonpos, transcript_id, SIFT_score, SIFT4G_score, Polyphen2_HDIV_score, Polyphen2_HVAR_score, VEST4_score, REVEL_score, MutPred_score, BayesDel_addAF_score, BayesDel_noAF_score, VARITY_R_score, VARITY_ER_score, VARITY_R_LOO_score, VARITY_ER_LOO_score, ESM1b_score, AlphaMissense_score, CADD_raw_score, id)
  SELECT name, source, source_url, ref, alt, aapos, gene_name, protein_name, '' as protein_id, hgvsp, hgvs as hgvsc, refcodon, codonpos, transcript_id, SIFT_score, SIFT4G_score, Polyphen2_HDIV_score, Polyphen2_HVAR_score, VEST4_score, REVEL_score, MutPred_score, BayesDel_addAF_score, BayesDel_noAF_score, VARITY_R_score, VARITY_ER_score, VARITY_R_LOO_score, VARITY_ER_LOO_score, ESM1b_score, AlphaMissense_score, CADD_raw_score, _key as id
  FROM s3('s3://igvf-catalog-parsed-collections/coding_variants/*', 'JSONEachRow', 'ref String, alt String, aapos String, name String, gene_name String, protein_name String, hgvsp String, hgvs String, refcodon String, codonpos String, transcript_id String, SIFT_score String, SIFT4G_score String, Polyphen2_HDIV_score String, Polyphen2_HVAR_score String, VEST4_score String, REVEL_score String, MutPred_score String, BayesDel_addAF_score String, BayesDel_noAF_score String, VARITY_R_score String, VARITY_ER_score String, VARITY_R_LOO_score String, VARITY_ER_LOO_score String, ESM1b_score String, AlphaMissense_score String, CADD_raw_score String, source String, source_url String, _key String, id String');

variants_coding_variants: |
  INSERT INTO variants_coding_variants (source, source_url, name, inverse_name, chr, pos, ref, alt, label, id, variants_id, coding_variants_id)
  SELECT source, source_url, name, inverse_name, chr, `pos:long` as pos, ref, alt, '' as label, '' as id, splitByString('/', assumeNotNull(_from))[2] as variants_id, splitByString('/', assumeNotNull(_to))[2] as coding_variants_id
  FROM s3('s3://igvf-catalog-parsed-collections/variants_coding_variants/*.jsonl', 'JSONEachRow', 'source String, source_url String, name String, inverse_name String, chr String, `pos:long` String, pos String, ref String, alt String, _from String, variants_id String, _to String, coding_variants_id String');

genes: |
  INSERT INTO genes (name, source, source_url, gene_id, gene_type, chr, start, end, strand, symbol, version, organism, study_sets, collections, version_number, hgnc, synonyms, entrez, id)
  SELECT name, source, source_url, gene_id, gene_type, chr, start, end, '' as strand, '' as symbol, version, '' as organism, [] as study_sets, [] as collections, '' as version_number, hgnc, [] as synonyms, entrez, _key as id
  FROM s3('s3://igvf-catalog-parsed-collections/genes/genes_*.jsonl', 'JSONEachRow', 'chr String, start String, end String, name String, gene_id String, gene_type String, hgnc String, entrez String, alias String, source String, version String, source_url String, Homo String, sapiens String, _key String, id String');

transcripts: |
  INSERT INTO transcripts (name, source, source_url, transcript_id, transcript_type, chr, start, end, strand, gene_name, MANE_Select, version, organism, id)
  SELECT name, source, source_url, transcript_id, transcript_type, chr, start, end, '' as strand, gene_name, false as MANE_Select, version, '' as organism, _key as id
  FROM s3('s3://igvf-catalog-parsed-collections/transcripts/transcripts_*.jsonl', 'JSONEachRow', 'chr String, start String, end String, gene_name String, name String, transcript_id String, transcript_type String, source String, version String, source_url String, Homo String, sapiens String, _key String, id String');

ontology_terms: |
  INSERT INTO ontology_terms (name, source, source_url, uri, term_id, description, synonyms, subontology, subset, id)
  SELECT name, source, source_url, uri, term_id, description, [] as synonyms, subontology, [] as subset, _key as id
  FROM s3('s3://igvf-catalog-parsed-collections/clickhouse/ontology_terms_with_subontology.jsonl', 'JSONEachRow', 'uri String, term_id String, name String, description String, synonyms String, source String, subontology String, _key String, id String, source_url String');
  INSERT INTO ontology_terms (name, source, source_url, uri, term_id, description, synonyms, subontology, subset, id)
  SELECT name, source, source_url, uri, term_id, description, [] as synonyms, NULL as subontology, [] as subset, _key as id
  FROM s3('s3://igvf-catalog-parsed-collections/clickhouse/ontology_terms_without_subontology.jsonl', 'JSONEachRow', 'uri String, term_id String, name String, description String, synonyms String, source String, _key String, id String, source_url String');
  INSERT INTO ontology_terms (name, source, source_url, uri, term_id, description, synonyms, subontology, subset, id)
  SELECT name, '' as source, '' as source_url, uri, term_id, description, [] as synonyms, NULL as subontology, [] as subset, _key as id
  FROM s3('s3://igvf-catalog-parsed-collections/ontology_terms/OBA_ontoloty_terms_IGVFDS0368ZLPX.jsonl', 'JSONEachRow', 'uri String, term_id String, name String, description String, synonyms String, OBA String, _key String, id String, https String, github String, com String, obophenotype String, bio String, attribute String, ontology String');

