variants_variants: |
  INSERT INTO variants_variants (chr, negated, variant_1_base_pair, variant_2_base_pair, variant_1_rsid, variant_2_rsid, r2, d_prime, ancestry, label, name, inverse_name, source, source_url, id, variants_1_id, variants_2_id)
  SELECT chr, toBool(negated) as negated, variant_1_base_pair, variant_2_base_pair, variant_1_rsid, variant_2_rsid, `r2:long` as r2, `d_prime:long` as d_prime, ancestry, label, name, inverse_name, source, source_url, '' as id, splitByString('/', assumeNotNull(_from))[2] as variants_1_id, splitByString('/', assumeNotNull(_to))[2] as variants_2_id
  FROM s3('s3://igvf-catalog-parsed-collections/variants_variants/topld*.jsonl', 'JSONEachRow', 'chr String, ancestry String, negated String, variant_1_base_pair String, variant_2_base_pair String, variant_1_rsid String, variant_2_rsid String, `r2:long` String, r2 String, `d_prime:long` String, d_prime String, label String, name String, inverse_name String, source String, source_url String, _from String, variants_1_id String, _to String, variants_2_id String');

