  INSERT INTO genes_genes (label, class, method, name, inverse_name, source, source_url, detection_method, detection_method_code, interaction_type, interaction_type_code, confidence_value_biogrid, confidence_value_intact, pmids, z_score, molecular_function, associated, id, genes_1_id, genes_2_id)
  SELECT '' as label, '' as class, '' as method, name, inverse_name, source, '' as source_url, detection_method, detection_method_code, interaction_type, interaction_type_code, confidence_value_biogrid, confidence_value_intact, pmids, z_score, '' as molecular_function, '' as associated, _key as id, splitByString('/', assumeNotNull(_from))[2] as genes_1_id, splitByString('/', assumeNotNull(_to))[2] as genes_2_id
  FROM s3('s3://igvf-catalog-parsed-collections/genes_genes/genes_genes_IGVFFI4317VDGK.jsonl', 'JSONEachRow', 'z_score String, source String, name String, inverse_name String, detection_method String, detection_method_code String, interaction_type String, interaction_type_code String, confidence_value_biogrid String, confidence_value_intact String, pmids String, _key String, id String, _from String, genes_1_id String, _to String, genes_2_id String')

